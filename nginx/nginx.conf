worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 10000;
    multi_accept on;
    use epoll; # Efficient polling on Linux
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Timeouts for slow clients (TCP back pressure control)
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65; # Maintain keep-alive for fast subsequent requests
    send_timeout 10;

    # Rate Limiting Zones (Nginx level, before Node.js)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Buffering for Back Pressure
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 10M; # Max payload size 10MB
    large_client_header_buffers 2 1k;

    # Upstream to PM2 Cluster
    upstream backend_cluster {
        # Assuming PM2 runs on default port 5000
        # If running multiple physical instances, add them here
        server 127.0.0.1:5000 max_fails=3 fail_timeout=30s;
        keepalive 64; # Keep-alive connections to upstream Node.js
    }

    server {
        listen 80 backlog=4096;
        server_name edgestone-api.local; # Replace with actual domain

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        location / {
            # Apply Rate Limiting
            limit_req zone=api_limit burst=100 nodelay;
            limit_conn conn_limit 20;

            # Proxy Pass to Node.js Cluster
            proxy_pass http://backend_cluster;
            
            # Proxy Headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forward real IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Upstream timeouts (TCP Back Pressure)
            proxy_connect_timeout 5s;
            proxy_send_timeout 15s;
            proxy_read_timeout 30s;
            
            # Upstream buffering (Handle slow clients without blocking Node.js)
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            proxy_busy_buffers_size 16k;
        }

        # Static file serving (bypass Node.js for uploads)
        location /uploads/ {
            alias /path/to/backend/uploads/; # UPDATE THIS PATH
            expires max;
            access_log off;
            add_header Cache-Control "public";
        }
    }
}
